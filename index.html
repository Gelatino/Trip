<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1816">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Trip / M × L</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="landing">
  <div class="landing-hero">
    <div class="landing-logo">
      <svg viewBox="0 0 44 44" fill="none">
        <circle cx="14" cy="14" r="10" fill="#e03a2c" stroke="#1a1816" stroke-width="1.5"/>
        <rect x="20" y="20" width="20" height="20" rx="3" fill="#2e5cd4" stroke="#1a1816" stroke-width="1.5"/>
        <circle cx="30" cy="14" r="6" fill="#e8b93f" stroke="#1a1816" stroke-width="1.5"/>
      </svg>
    </div>
    <h1 class="landing-title">Trip / M<em>×</em>L</h1>
    <p class="landing-subtitle">China, 2026</p>
  </div>

  <nav class="landing-nav">
    <a href="trip_expenses.html" class="landing-card" id="link-expenses">
      <div class="landing-card-icon money">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f0ead8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 7v10M9 9.5h5a2 2 0 0 1 0 4H10a2 2 0 0 0 0 4h5"/>
        </svg>
      </div>
      <div class="landing-card-text">
        <h2 class="landing-card-title">Expenses</h2>
        <p class="landing-card-sub">who pays what</p>
      </div>
      <span class="landing-card-arrow">→</span>
    </a>

    <a href="plan.html" class="landing-card" id="link-plan">
      <div class="landing-card-icon plan">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f0ead8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s-7-5.5-7-11a7 7 0 1 1 14 0c0 5.5-7 11-7 11z"/>
          <circle cx="12" cy="10" r="2.5"/>
        </svg>
      </div>
      <div class="landing-card-text">
        <h2 class="landing-card-title">Plan</h2>
        <p class="landing-card-sub">hotels & places</p>
      </div>
      <span class="landing-card-arrow">→</span>
    </a>
  </nav>

  <div class="landing-meta">
    <span class="landing-identity" id="identity-display">you are <strong id="identity-name">?</strong></span>
    <button class="secondary-btn" id="change-identity-btn" style="width: auto; padding: 6px 14px; margin: 0; font-size: 11px;">Change</button>
  </div>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
function updateIdentityDisplay() {
  const el = document.getElementById('identity-name');
  if (el) el.textContent = window.__identity || '?';

  // Pass identity through to links
  const suffix = window.__identity ? '?who=' + window.__identity : '';
  const links = ['link-expenses', 'link-plan'];
  links.forEach(id => {
    const link = document.getElementById(id);
    if (link) {
      const base = link.getAttribute('href').split('?')[0];
      link.setAttribute('href', base + suffix);
    }
  });
}

function onIdentityChange(who) {
  updateIdentityDisplay();
}

// On first load, if no identity, ask
if (!window.__identity) {
  askIdentity();
}
updateIdentityDisplay();

document.getElementById('change-identity-btn').onclick = askIdentity;
</script>

</body>
</html>
